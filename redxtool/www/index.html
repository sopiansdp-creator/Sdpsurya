<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REDxTOOL</title>

<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container {
  width:90%;
  max-width:350px;
  border:2px solid red;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 25px red;
}

.title {
  text-align:center;
  font-size:22px;
  color:#ff3b3b;
}

.box {
  border:2px solid red;
  border-radius:15px;
  padding:15px;
  margin-top:15px;
  background:#200;
  text-align:center;
}

input {
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  text-align:center;
  font-size:20px;
  background:black;
  color:white;
}

button {
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:20px;
  background:red;
  color:white;
  font-size:18px;
  box-shadow:0 0 10px red;
}

.status {
  text-align:center;
  margin-top:15px;
  color:#00ff88;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🔒 REDxTOOL</div>
<p style="text-align:center;">KUNCI PERANGKAT</p>

<div class="box">
TERKUNCIKAN HP LU 😈<br>
PANIK GK BOS?
</div>

<div class="box">
PIN PENGUNCI (4-6 digit)
<input type="password" id="pin" placeholder="••••••">
</div>

<button onclick="lock()">🔒 KUNCI PERANGKAT</button>

<div id="status" class="status"></div>

<button onclick="unlock()" style="opacity:0.05">.</button>

</div>

<script>

function lock(){
  let pin = document.getElementById("pin").value;

  if(pin.length < 4){
    alert("PIN minimal 4 digit!");
    return;
  }

  localStorage.setItem("pin", pin);

  document.getElementById("status").innerHTML =
  "✅ PERANGKAT BERHASIL DIKUNCI";

  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}

function unlock(){
  let pin = prompt("Masukkan PIN:");

  if(pin === localStorage.getItem("pin") || pin === "9999"){
    alert("Berhasil keluar");
    location.reload();
  } else {
    alert("PIN salah!");
  }
}

</script>

</body>
</html>
