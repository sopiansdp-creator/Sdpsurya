<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cuan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-indigo-600 font-sans text-gray-800">

    <div class="max-w-md mx-auto min-h-screen pb-20">
        <div class="p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-green-500 p-2 rounded-full text-xs">WA</div>
                <h1 class="font-bold text-lg">CuanSewaWA</h1>
            </div>
            <div class="flex gap-2">
                <button class="bg-white/20 p-2 rounded-full"><i class="fa-solid fa-sign-out"></i></button>
                <div class="bg-purple-500 w-10 h-10 rounded-full flex items-center justify-center font-bold">M</div>
            </div>
        </div>

        <div class="px-4 mb-6">
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="text-orange-400">📢</span> Halo, Menarapuncak!
                </h2>
                <p class="text-gray-500 mt-1">Selamat datang di dashboard cuansewawa</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 px-4">
            <div class="bg-white rounded-2xl p-5 flex flex-col items-center shadow-md">
                <div class="text-green-500 text-2xl mb-2"><i class="fa-regular fa-circle-check"></i></div>
                <div class="text-3xl font-black">0</div>
                <div class="text-xs font-bold text-gray-400 uppercase">Aktif</div>
            </div>
            <div class="bg-white rounded-2xl p-5 flex flex-col items-center shadow-md">
                <div class="text-red-500 text-2xl mb-2"><i class="fa-regular fa-circle-xmark"></i></div>
                <div class="text-3xl font-black">9</div>
                <div class="text-xs font-bold text-gray-400 uppercase">Offline</div>
            </div>
            <div class="bg-white rounded-2xl p-5 flex flex-col items-center shadow-md">
                <div class="text-blue-500 text-2xl mb-2"><i class="fa-solid fa-paper-plane"></i></div>
                <div class="text-3xl font-black">0</div>
                <div class="text-xs font-bold text-gray-400 uppercase">Blast</div>
            </div>
            <div class="bg-white rounded-2xl p-5 flex flex-col items-center shadow-md">
                <div class="text-yellow-500 text-2xl mb-2"><i class="fa-solid fa-dollar-sign"></i></div>
                <div class="text-xl font-black">Rp 0</div>
                <div class="text-xs font-bold text-gray-400 uppercase">Earning</div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 px-2 shadow-2xl">
            <div class="flex flex-col items-center text-purple-600">
                <i class="fa-solid fa-house"></i>
                <span class="text-[10px] mt-1 font-bold">Dashboard</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-brands fa-whatsapp"></i>
                <span class="text-[10px] mt-1">WhatsApp</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-users"></i>
                <span class="text-[10px] mt-1">Referral</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-wallet"></i>
                <span class="text-[10px] mt-1">Withdraw</span>
            </div>
        </div>
    </div>

</body>
</html>
